<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Status Monitor</h1>
    <p class="subtitle">Войди через Google и выбери свой статус.</p>

    <div id="message" class="message hidden"></div>

    <section id="authSection" class="card auth-box">
      <h2>Вход</h2>
      <button id="googleLoginBtn" type="button" class="google-btn">
        Войти через Google
      </button>
    </section>

    <section id="appSection" class="hidden">
      <div class="card profile-card">
        <div class="profile-top">
          <div class="profile-main">
            <img id="profileAvatar" class="profile-avatar" src="" alt="Аватар" />
            <div>
              <h2>Мой профиль</h2>
              <p id="profileName">...</p>
              <p id="profileEmail" class="muted">...</p>
            </div>
          </div>
          <button id="logoutBtn" type="button" class="logout-btn">Выйти</button>
        </div>

        <p class="status-label">Выбери статус:</p>
        <div class="status-buttons" id="statusButtons"></div>
      </div>

      <div class="card">
        <h2>Остальные пользователи</h2>
        <div id="usersList" class="users-list"></div>
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
